name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    env:
      # These values are used only by the app factory at import time.
      # TestingConfig (in tests/conftest.py) overrides all of them for
      # the actual test run, so no real secrets are needed here.
      SECRET_KEY: ci-only-not-a-production-secret
      ADMIN_REGISTRATION_CODE: ci-admin-code
      DATABASE_URL: sqlite:///ci_helpdesk.db
      SESSION_COOKIE_SECURE: 'false'
      FLASK_DEBUG: '0'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest --tb=short --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
