<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>500 Internal Server Error</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container vh-100 d-flex flex-column justify-content-center align-items-center text-center">
    <h1 class="display-1 fw-bold text-danger">500</h1>
    <h2 class="mb-3">Internal Server Error</h2>
    <p class="text-muted">
      Something went wrong on our end. The issue has been logged and will be investigated.
      Please try again later.
    </p>
    <a href="{{ url_for('home') }}" class="btn btn-primary mt-2">Go to Home</a>
  </div>
</body>
</html>
