<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>400 Bad Request</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container vh-100 d-flex flex-column justify-content-center align-items-center text-center">
    <h1 class="display-1 fw-bold text-warning">400</h1>
    <h2 class="mb-3">Bad Request</h2>
    <p class="text-muted">
      Your request could not be processed. This is usually caused by a missing or
      expired security token — try going back and submitting the form again.
    </p>
    <a href="{{ url_for('home') }}" class="btn btn-primary mt-2">Go to Home</a>
  </div>
</body>
</html>
